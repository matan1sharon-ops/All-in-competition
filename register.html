<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Register Patcher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:14px;padding:32px;width:100%;max-width:560px;}
.logo{font-size:28px;font-weight:900;letter-spacing:4px;color:#FFD700;font-family:'Arial Black',sans-serif;margin-bottom:4px;}
.sub{font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.drop-zone{border:2px dashed #333;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:16px;}
.drop-zone:hover{border-color:#FFD700;background:#1a1500;}
input[type=file]{display:none;}
.patch-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #252525;font-size:12px;color:#aaa;}
.patch-item:last-child{border-bottom:none;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#444;}
.dot-ok{background:#43a047;box-shadow:0 0 6px #43a047;}
.dot-err{background:#e53935;}
.btn{width:100%;padding:14px;background:#FFD700;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;}
.btn:disabled{background:#333;color:#555;cursor:not-allowed;}
.btn-dl{background:#43a047;color:#fff;margin-top:10px;display:none;}
.status{margin-top:14px;padding:12px;border-radius:8px;font-size:13px;font-weight:600;display:none;}
.status.success{background:#1b5e2022;border:1px solid #43a047;color:#81c784;}
.status.error{background:#b71c1c22;border:1px solid #e53935;color:#ef9a9a;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">ALL IN</div>
  <div class="sub">Register.html Patcher — Custom Categories</div>
  <div class="drop-zone" id="dz" onclick="document.getElementById('fi').click()"
       ondragover="event.preventDefault();this.style.borderColor='#FFD700'"
       ondragleave="this.style.borderColor='#333'"
       ondrop="handleDrop(event)">
    <div style="font-size:32px;margin-bottom:6px;">📂</div>
    <p style="font-size:13px;"><strong>Click to choose</strong> or drag & drop register.html</p>
    <p id="fn" style="margin-top:6px;color:#FFD700;font-weight:600;"></p>
  </div>
  <input type="file" id="fi" accept=".html" onchange="loadFile(this)">
  <div style="background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:16px;">
    <div class="patch-item"><div class="dot" id="d1"></div><span>Filter bow dropdown to allowedBows from competition</span></div>
    <div class="patch-item"><div class="dot" id="d2"></div><span>Filter age dropdown to allowedAges from competition</span></div>
  </div>
  <button class="btn" id="pb" onclick="applyPatch()" disabled>⚡ APPLY PATCH</button>
  <button class="btn btn-dl" id="db" onclick="download()">⬇️ DOWNLOAD PATCHED register.html</button>
  <div class="status" id="st"></div>
</div>
<script>
let src=null,patched=null;

function handleDrop(e){e.preventDefault();document.getElementById('dz').style.borderColor='#333';const f=e.dataTransfer.files[0];if(f)loadFile({files:[f]});}
function loadFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{src=e.target.result;document.getElementById('fn').textContent='✓ '+f.name+' loaded';document.getElementById('dz').style.borderColor='#43a047';document.getElementById('pb').disabled=false;['d1','d2'].forEach(id=>document.getElementById(id).className='dot');document.getElementById('db').style.display='none';document.getElementById('st').style.display='none';};
  r.readAsText(f);
}

function applyPatch(){
  if(!src)return;
  let c=src;

  // PATCH 1: Filter bow dropdown after loading competition
  // Find the line that sets comp-display and add bow filtering after it
  const old1 = `document.getElementById('comp-display').textContent=
      \`🏆 \${compData.name}\`+(compData.date?\`  ·  \${compData.date}\`:'')+(compData.location?\`  ·  \${compData.location}\`:'');
    document.title=\`\${t('sub_title')} — \${compData.name}\`;`;
  const new1 = `document.getElementById('comp-display').textContent=
      \`🏆 \${compData.name}\`+(compData.date?\`  ·  \${compData.date}\`:'')+(compData.location?\`  ·  \${compData.location}\`:'');
    document.title=\`\${t('sub_title')} — \${compData.name}\`;
    // Filter bow types if allowedBows set (Custom discipline)
    if(compData.allowedBows&&compData.allowedBows.length){
      const bowSel=document.getElementById('bow');
      [...bowSel.options].forEach(o=>{o.style.display=compData.allowedBows.includes(o.value)?'':'none';});
      if(!compData.allowedBows.includes(bowSel.value))bowSel.value=compData.allowedBows[0];
    }
    // Filter age categories if allowedAges set
    if(compData.allowedAges&&compData.allowedAges.length){
      const ageSel=document.getElementById('age');
      [...ageSel.options].forEach(o=>{o.style.display=compData.allowedAges.includes(o.value)?'':'none';});
      if(!compData.allowedAges.includes(ageSel.value))ageSel.value=compData.allowedAges[0];
    }`;

  const ok1=c.includes(old1.split('\n')[0].trim().substring(0,40));
  // Try simpler match
  const simpleOld1 = "document.title=`${t('sub_title')} — ${compData.name}`;";
  const simpleNew1 = `document.title=\`\${t('sub_title')} — \${compData.name}\`;
    if(compData.allowedBows&&compData.allowedBows.length){const bowSel=document.getElementById('bow');[...bowSel.options].forEach(o=>{o.style.display=compData.allowedBows.includes(o.value)?'':'none';});if(!compData.allowedBows.includes(bowSel.value))bowSel.value=compData.allowedBows[0];}
    if(compData.allowedAges&&compData.allowedAges.length){const ageSel=document.getElementById('age');[...ageSel.options].forEach(o=>{o.style.display=compData.allowedAges.includes(o.value)?'':'none';});if(!compData.allowedAges.includes(ageSel.value))ageSel.value=compData.allowedAges[0];}`;

  if(c.includes(simpleOld1)){
    c=c.replace(simpleOld1,simpleNew1);
    document.getElementById('d1').className='dot dot-ok';
    document.getElementById('d2').className='dot dot-ok';
  } else {
    document.getElementById('d1').className='dot dot-err';
    document.getElementById('d2').className='dot dot-err';
  }

  patched=c;
  const st=document.getElementById('st');
  const allOk=[...document.querySelectorAll('.dot')].every(d=>d.className.includes('ok'));
  if(allOk){st.className='status success';st.textContent='✓ All patches applied!';st.style.display='block';document.getElementById('db').style.display='block';}
  else{st.className='status error';st.textContent='Some patches failed — check file version';st.style.display='block';if(c!==src)document.getElementById('db').style.display='block';}
}

function download(){
  const blob=new Blob([patched],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='register.html';a.click();URL.revokeObjectURL(url);
}
</script>
</body>
</html>
